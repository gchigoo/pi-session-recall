name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: "22.19.0"
          - os: ubuntu-latest
            node: "24"
          - os: macos-latest
            node: "22.19.0"
          - os: windows-latest
            node: "22.19.0"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run test:integration
      - run: npm run test:security
      - run: npm run eval:recall
      - run: npm run test:package
      - run: npm run probe
      - run: npm run pack:dry

  bench:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run bench:recall
        timeout-minutes: 30
